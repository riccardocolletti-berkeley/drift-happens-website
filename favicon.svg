<!-- favicon: a temporal drift matrix on a red-blue diverging scale,
     biased red along the diagonal running bottom-left -> top-right -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#ffffff" />
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#16181d" stroke-width="2" />
  <g>
    <!-- row 0 (top) --><rect x="5"  y="5"  width="5" height="5" fill="#2f43c4" /><rect x="11" y="5"  width="5" height="5" fill="#8aa6e0" /><rect x="17" y="5"  width="5" height="5" fill="#e08a7d" /><rect x="23" y="5"  width="5" height="5" fill="#c0392b" />
    <!-- row 1 --><rect x="5"  y="11" width="5" height="5" fill="#8aa6e0" /><rect x="11" y="11" width="5" height="5" fill="#e08a7d" /><rect x="17" y="11" width="5" height="5" fill="#c0392b" /><rect x="23" y="11" width="5" height="5" fill="#e08a7d" />
    <!-- row 2 --><rect x="5"  y="17" width="5" height="5" fill="#e08a7d" /><rect x="11" y="17" width="5" height="5" fill="#c0392b" /><rect x="17" y="17" width="5" height="5" fill="#e08a7d" /><rect x="23" y="17" width="5" height="5" fill="#8aa6e0" />
    <!-- row 3 (bottom) --><rect x="5"  y="23" width="5" height="5" fill="#c0392b" /><rect x="11" y="23" width="5" height="5" fill="#e08a7d" /><rect x="17" y="23" width="5" height="5" fill="#8aa6e0" /><rect x="23" y="23" width="5" height="5" fill="#2f43c4" />
  </g>
</svg>
